<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #ffffff; /* خلفية بيضاء صافية فخمة */
            background-image: radial-gradient(circle, #fff 0%, #fff8f8 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; 
        }
        
        .main-content {
            text-align: center;
            z-index: 50;
            pointer-events: none; /* عشان ما يضغط على الكلام بالخطأ */
        }

        .names {
            font-family: 'Great Vibes', cursive; /* خط رومانسي وواضح جداً للـ y والـ v */
            font-size: 5rem;
            color: #d63384; /* وردي غامق فخم */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        .message {
            font-family: 'Montserrat', sans-serif; /* خط مودرن وبسيط */
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* تنسيق القلوب المتساقطة من فوق لتحت */
        .falling-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.6); /* قلوب ناعمة وشفافة شوي */
            pointer-events: none;
            z-index: 10;
            animation: fallDown linear forwards;
        }

        @keyframes fallDown {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff0f5; display: flex; justify-content: center;
            align-items: center; z-index: 100; color: #d63384; cursor: pointer;
            font-family: 'Great Vibes', cursive; font-size: 3rem;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

<div id="overlay">Tap to see my heart 💖</div>

<audio id="music" loop><source src="12.mp3" type="audio/mpeg"></audio>

<div class="main-content">
    <div class="names">Mshtoly & Toly</div>
    <div class="message">Together Forever</div>
</div>

<script>
    const overlay = document.getElementById('overlay');
    const music = document.getElementById('music');

    overlay.addEventListener('click', () => {
        music.play();
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 1000);
        
        // توليد قلوب ناعمة تتساقط من الأعلى
        setInterval(() => {
            const heart = document.createElement("div");
            heart.className = "falling-heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 15 + 15 + "px"; 
            heart.style.animationDuration = (Math.random() * 3 + 5) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }, 400); 
    });
</script>
</body>
</html>
