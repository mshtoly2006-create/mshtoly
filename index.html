<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #ffffff; background-image: radial-gradient(circle, #fff 0%, #fffafa 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .main-content { text-align: center; z-index: 50; pointer-events: none; width: 100%; }
        
        .names { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.5rem; 
            color: #d63384; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.02); 
            margin-bottom: 10px;
            line-height: 1.2;
        }
        
        .message { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; color: #aaa; letter-spacing: 4px; text-transform: uppercase; }
        
        .falling-heart { 
            position: absolute; 
            top: -50px; 
            color: rgba(255, 77, 109, 0.5); 
            pointer-events: none; 
            z-index: 10; 
            animation: fallDown linear forwards; 
        }
        
        @keyframes fallDown { 
            0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; } 
            10% { opacity: 1; } 
            100% { transform: translateY(110vh) rotate(360deg) scale(1); opacity: 0; } 
        }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f7; display: flex; justify-content: center; align-items: center; z-index: 100; color: #d63384; cursor: pointer; font-family: 'Great Vibes', cursive; font-size: 2.5rem; transition: opacity 1s; }
    </style>
</head>
<body>

<div id="overlay">Tap to see my heart 💖</div>

<audio id="music" loop><source src="12.mp3" type="audio/mpeg"></audio>

<div class="main-content">
    <div class="names">Mshtoly & Toly</div>
    <div class="message">Together Forever</div>
</div>

<script>
    const overlay = document.getElementById('overlay');
    const music = document.getElementById('music');
    overlay.addEventListener('click', () => {
        music.play();
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 1000);
        
        setInterval(() => {
            const heart = document.createElement("div");
            heart.className = "falling-heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 12 + 12 + "px"; 
            heart.style.animationDuration = (Math.random() * 4 + 4) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }, 450); 
    });
</script>
</body>
</html>
